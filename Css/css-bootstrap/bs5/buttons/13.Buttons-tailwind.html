<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Buttons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin-bottom: 750px;
        }
    </style>
</head>

<body class="p-6 bg-gray-50">
    <button class="bg-blue-600 text-white px-4 py-2 rounded">Primary</button>
    <button class="bg-gray-600 text-white px-4 py-2 rounded">Secondary</button>
    <button class="bg-green-600 text-white px-4 py-2 rounded">Success</button>
    <button class="bg-red-600 text-white px-4 py-2 rounded">Danger</button>
    <button class="bg-yellow-400 text-black px-4 py-2 rounded">Warning</button>
    <button class="bg-cyan-500 text-white px-4 py-2 rounded">Info</button>
    <button class="bg-gray-200 text-black px-4 py-2 rounded">Light</button>
    <button class="bg-gray-800 text-white px-4 py-2 rounded">Dark</button>
    <button class="underline text-blue-600 px-4 py-2">Link</button>

    <br><br><hr class="my-4"><br>

    <button class="border border-blue-600 text-blue-600 px-4 py-2 rounded bg-white">Primary</button>
    <button class="border border-gray-600 text-gray-600 px-4 py-2 rounded bg-white">Secondary</button>
    <button class="border border-green-600 text-green-600 px-4 py-2 rounded bg-white">Success</button>
    <button class="border border-red-600 text-red-600 px-4 py-2 rounded bg-white">Danger</button>
    <button class="border border-yellow-400 text-yellow-600 px-4 py-2 rounded bg-white">Warning</button>
    <button class="border border-cyan-500 text-cyan-600 px-4 py-2 rounded bg-white">Info</button>
    <button class="border border-gray-200 text-gray-400 px-4 py-2 rounded bg-white">Light</button>
    <button class="border border-gray-800 text-gray-800 px-4 py-2 rounded bg-white">Dark</button>

    <br><br><hr class="my-4"><br>
    <button class="bg-blue-600 text-white px-8 py-3 rounded text-lg">Large button</button>
    <button class="bg-gray-600 text-white px-8 py-3 rounded text-lg">Large button</button>
    <br><br><hr class="my-4"><br>
    <button class="bg-blue-600 text-white px-2 py-1 rounded text-sm">Small button</button>
    <button class="bg-gray-600 text-white px-2 py-1 rounded text-sm">Small button</button>

    <br><br><hr class="my-4"><br>
    <button class="bg-blue-600 text-white px-4 py-2 rounded opacity-50 cursor-not-allowed" disabled>Primary button</button>
    <button class="bg-gray-600 text-white px-4 py-2 rounded opacity-50 cursor-not-allowed" disabled>Button</button>
    <button class="border border-blue-600 text-blue-600 px-4 py-2 rounded bg-white opacity-50 cursor-not-allowed" disabled>Primary button</button>
    <button class="border border-gray-600 text-gray-600 px-4 py-2 rounded bg-white opacity-50 cursor-not-allowed" disabled>Button</button>
    <br><br><hr class="my-4"><br>

    <div class="inline-flex rounded-md shadow-sm" role="group">
        <button class="bg-blue-600 text-white px-4 py-2 rounded-l">Left</button>
        <button class="bg-blue-600 text-white px-4 py-2 border-l border-blue-700">Middle</button>
        <button class="bg-blue-600 text-white px-4 py-2 rounded-r border-l border-blue-700">Right</button>
    </div>

    <br><br><hr class="my-4"><br>

    <div class="inline-flex rounded-md shadow-sm" role="group">
        <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-l">Active link</a>
        <a href="#" class="bg-blue-600 text-white px-4 py-2 border-l border-blue-700">Link</a>
        <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-r border-l border-blue-700">Link</a>
    </div>

    <br><br><hr class="my-4"><br>

    <div class="inline-flex rounded-md shadow-sm" role="group">
        <button class="bg-red-600 text-white px-4 py-2 rounded-l">Left</button>
        <button class="bg-yellow-400 text-black px-4 py-2 border-l border-yellow-500">Middle</button>
        <button class="bg-green-600 text-white px-4 py-2 rounded-r border-l border-green-700">Right</button>
    </div>

    <br><br><hr class="my-4"><br>

    <div class="inline-flex rounded-md shadow-sm" role="group">
        <button class="border border-blue-600 text-blue-600 px-4 py-2 rounded-l bg-white">Left</button>
        <button class="border border-blue-600 text-blue-600 px-4 py-2 border-l-0 bg-white">Middle</button>
        <button class="border border-blue-600 text-blue-600 px-4 py-2 rounded-r border-l-0 bg-white">Right</button>
    </div>
    <br><br><hr class="my-4"><br>
    <div class="inline-flex rounded-md shadow-sm" role="group">
        <div>
            <input type="checkbox" id="twcheck1" class="hidden peer">
            <label for="twcheck1" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-l bg-white cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white">Checkbox 1</label>
        </div>
        <div>
            <input type="checkbox" id="twcheck2" class="hidden peer">
            <label for="twcheck2" class="border border-blue-600 text-blue-600 px-4 py-2 bg-white cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white">Checkbox 2</label>
        </div>
        <div>
            <input type="checkbox" id="twcheck3" class="hidden peer">
            <label for="twcheck3" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-r bg-white cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white">Checkbox 3</label>
        </div>
    </div>
    <br><br><hr class="my-4"><br>

    <div class="inline-flex rounded-md shadow-sm" role="group">
        <div>
            <input type="radio" name="twradio" id="twradio1" class="hidden peer" checked>
            <label for="twradio1" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-l bg-white cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white">Radio 1</label>
        </div>
        <div>
            <input type="radio" name="twradio" id="twradio2" class="hidden peer">
            <label for="twradio2" class="border border-blue-600 text-blue-600 px-4 py-2 bg-white cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white">Radio 2</label>
        </div>
        <div>
            <input type="radio" name="twradio" id="twradio3" class="hidden peer">
            <label for="twradio3" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-r bg-white cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white">Radio 3</label>
        </div>
    </div>
    <br><br><hr class="my-4"><br>

    <div class="flex space-x-2 mb-4">
        <button class="bg-blue-600 text-white px-4 py-2 rounded">1</button>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">2</button>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">3</button>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">4</button>
    </div>
    <div class="flex space-x-2 mb-4">
        <button class="bg-gray-600 text-white px-4 py-2 rounded">5</button>
        <button class="bg-gray-600 text-white px-4 py-2 rounded">6</button>
        <button class="bg-gray-600 text-white px-4 py-2 rounded">7</button>
    </div>
    <div class="flex space-x-2 mb-4">
        <button class="bg-cyan-500 text-white px-4 py-2 rounded">8</button>
    </div>

    <br><br><hr class="my-4"><br>

    <div class="inline-flex rounded-md shadow-sm text-lg" role="group">
        <button class="border border-gray-800 text-gray-800 px-6 py-3 rounded-l bg-white">Left</button>
        <button class="border border-gray-800 text-gray-800 px-6 py-3 border-l-0 bg-white">Middle</button>
        <button class="border border-gray-800 text-gray-800 px-6 py-3 rounded-r border-l-0 bg-white">Right</button>
    </div>
    <br>
    <div class="inline-flex rounded-md shadow-sm" role="group">
        <button class="border border-gray-800 text-gray-800 px-4 py-2 rounded-l bg-white">Left</button>
        <button class="border border-gray-800 text-gray-800 px-4 py-2 border-l-0 bg-white">Middle</button>
        <button class="border border-gray-800 text-gray-800 px-4 py-2 rounded-r border-l-0 bg-white">Right</button>
    </div>
    <br>
    <div class="inline-flex rounded-md shadow-sm text-sm" role="group">
        <button class="border border-gray-800 text-gray-800 px-2 py-1 rounded-l bg-white">Left</button>
        <button class="border border-gray-800 text-gray-800 px-2 py-1 border-l-0 bg-white">Middle</button>
        <button class="border border-gray-800 text-gray-800 px-2 py-1 rounded-r border-l-0 bg-white">Right</button>
    </div>
    <br><br><hr class="my-4"><br>
    <div class="flex flex-col space-y-2 w-40">
        <button class="bg-gray-800 text-white px-4 py-2 rounded">Button</button>
        <button class="bg-gray-800 text-white px-4 py-2 rounded">Button</button>
        <button class="bg-gray-800 text-white px-4 py-2 rounded">Button</button>
        <button class="bg-gray-800 text-white px-4 py-2 rounded">Button</button>
        <button class="bg-gray-800 text-white px-4 py-2 rounded">Button</button>
        <button class="bg-gray-800 text-white px-4 py-2 rounded">Button</button>
    </div>
</body>

</html>
